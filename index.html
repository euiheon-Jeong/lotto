<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotto Number Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="theme-toggle">
      <button id="themeToggle" aria-label="Toggle dark mode">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
      </button>
    </div>
    <header>
      <h1>Lucky <span>Lotto</span></h1>
      <p>Your fortune starts here. Tap the button for 5 sets of lucky numbers!</p>
    </header>

    <main>
      <div class="button-wrapper">
        <button id="generateBtn" class="glow-button">Generate My Lucky Numbers</button>
      </div>
      <div id="resultsContainer" class="results-container">
        <!-- Results will be injected here -->
      </div>

      <section class="inquiry-section">
        <h2>Affiliate Inquiry</h2>
        <p>Interested in partnering with us? Send us a message!</p>
        <form action="https://formspree.io/f/xykbvdgr" method="POST" class="inquiry-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="_replyto" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
          </div>
          <button type="submit" class="submit-button">Send Message</button>
        </form>
      </section>
    </main>

    <footer>
      <p>Good luck!</p>
    </footer>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
